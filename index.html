<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIDA-pad Interface</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --nida-bg: #1a1a1a;
            --nida-panel-bg: #262626;
            --nida-sidebar-bg: #333333;
            --nida-sidebar-active: #4d4d4d;
            --nida-text: #e0e0e0;
            --nida-text-muted: #999999;
            --nida-accent-green: #4caf50;
            --nida-border: #404040;
            --nida-header-bg: #000000;
        }

        body {
            background-color: #000;
            color: var(--nida-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        .nida-header {
            background-color: var(--nida-header-bg);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--nida-border);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .grid-icon { width: 24px; height: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-icon div { background: white; border-radius: 1px; }

        .top-nav { display: flex; gap: 15px; }
        .top-nav-item { display: flex; flex-direction: column; align-items: center; font-size: 9px; color: var(--nida-text-muted); cursor: pointer; }
        .top-nav-item .icon-circle { width: 22px; height: 22px; border: 1px solid var(--nida-text-muted); border-radius: 50%; margin-bottom: 2px; }

        .header-right { display: flex; align-items: center; gap: 15px; }
        .patient-mini-card { display: flex; align-items: center; gap: 10px; background: #222; padding: 5px 10px; border-radius: 4px; font-size: 11px; }
        .patient-mini-card img { width: 30px; height: 30px; background: #444; border-radius: 2px; }

        /* --- Main Layout --- */
        .nida-main { display: flex; flex: 1; overflow: hidden; }

        /* --- Sidebar --- */
        .nida-sidebar {
            width: 120px;
            background-color: var(--nida-sidebar-bg);
            display: flex;
            flex-direction: column;
        }

        .sidebar-item {
            padding: 12px 8px;
            font-size: 11px;
            border-bottom: 1px solid var(--nida-border);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .sidebar-item.active { background-color: var(--nida-sidebar-active); }
        .sidebar-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--nida-accent-green); }
        .sidebar-num { font-weight: bold; color: var(--nida-text-muted); width: 12px; }

        /* --- Content Area --- */
        .nida-content {
            flex: 1;
            background-color: var(--nida-bg);
            padding: 10px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 10px;
        }

        /* --- Card / Tiles --- */
        .nida-card {
            background-color: var(--nida-panel-bg);
            border: 1px solid var(--nida-border);
            padding: 15px;
            position: relative;
        }

        .card-header {
            color: var(--nida-text-muted);
            font-size: 13px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--nida-border);
            padding-bottom: 5px;
        }

        .card-row { display: flex; gap: 20px; margin-bottom: 10px; }
        .info-group { display: flex; flex-direction: column; }
        .info-label { font-size: 10px; color: var(--nida-text-muted); }
        .info-value { font-size: 14px; }

        .accent-bar { position: absolute; left: 0; top: 15px; bottom: 15px; width: 3px; background: var(--nida-accent-green); }

        /* Form Elements */
        .nida-input {
            background: #111;
            border: 1px solid var(--nida-border);
            color: #fff;
            padding: 5px;
            width: 100%;
            margin-top: 5px;
        }

        /* Vital Box */
        .vital-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .vital-tile { background: #1a1a1a; padding: 10px; border: 1px solid var(--nida-border); text-align: center; }
        .vital-val { font-size: 24px; color: var(--nida-accent-green); font-family: monospace; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState(1);

            const sidebarItems = [
                "Rett. Daten", "Anamnese", "Erstbefund", "Diagnose", 
                "Verlauf", "Maßnahmen", "Medikamente", "Übergabe", "Ergebnis"
            ];

            return (
                <div style={{display: 'flex', flexDirection: 'column', height: '100%'}}>
                    {/* Header */}
                    <header className="nida-header">
                        <div className="header-left">
                            <div className="grid-icon">
                                {[...Array(9)].map((_, i) => <div key={i} />)}
                            </div>
                            <nav className="top-nav">
                                {["Anmeldung", "Info", "Notarzt", "SOP", "Schnelldoku"].map(item => (
                                    <div key={item} className="top-nav-item">
                                        <div className="icon-circle"></div>
                                        {item}
                                    </div>
                                ))}
                            </nav>
                        </div>
                        <div className="header-right">
                            <div className="patient-mini-card">
                                <img src="" alt="P" />
                                <div>
                                    <strong>Müller, Alfred</strong><br/>
                                    <span style={{color: '#999'}}>69 J | 45895</span>
                                </div>
                            </div>
                            <div style={{textAlign: 'right', fontSize: '14px'}}>
                                <strong>12:24</strong><br/>
                                <span style={{fontSize: '10px', color: '#999'}}>03.03.2022</span>
                            </div>
                        </div>
                    </header>

                    <div className="nida-main">
                        {/* Sidebar */}
                        <aside className="nida-sidebar">
                            {sidebarItems.map((item, index) => (
                                <div 
                                    key={item} 
                                    className={`sidebar-item ${activeTab === index + 1 ? 'active' : ''}`}
                                    onClick={() => setActiveTab(index + 1)}
                                >
                                    <span className="sidebar-num">{index + 1}</span>
                                    {item}
                                </div>
                            ))}
                            <div className="sidebar-item" style={{marginTop: 'auto'}}>Abschluss</div>
                        </aside>

                        {/* Content Area */}
                        <main className="nida-content">
                            {/* Kachel Patient */}
                            <section className="nida-card">
                                <div className="accent-bar"></div>
                                <div className="card-header">Patient</div>
                                <div className="card-row">
                                    <div className="info-group" style={{flex: 2}}>
                                        <span className="info-label">Name</span>
                                        <span className="info-value">Müller, Alfred</span>
                                    </div>
                                    <div className="info-group">
                                        <span className="info-label">Geburtsdatum</span>
                                        <span className="info-value">20.06.1952</span>
                                    </div>
                                    <div className="info-group">
                                        <span className="info-label">Alter</span>
                                        <span className="info-value">69</span>
                                    </div>
                                </div>
                                <div className="info-group">
                                    <span className="info-label">Adresse</span>
                                    <span className="info-value">Teichstraße 7, Berghausen</span>
                                </div>
                            </section>

                            {/* Kachel Einsatzdaten */}
                            <section className="nida-card">
                                <div className="card-header">Einsatzdaten</div>
                                <div className="card-row">
                                    <div className="info-group">
                                        <span className="info-label">Einsatznummer</span>
                                        <span className="info-value">45895</span>
                                    </div>
                                    <div className="info-group">
                                        <span className="info-label">Einsatzart</span>
                                        <span className="info-value">Notfall</span>
                                    </div>
                                </div>
                                <div className="info-group">
                                    <span className="info-label">Versorgung</span>
                                    <span className="info-value">Transport mit Notarzt</span>
                                </div>
                            </section>

                            {/* Kachel Zeiten */}
                            <section className="nida-card" style={{gridColumn: '1 / span 2'}}>
                                <div className="card-header">Zeiten</div>
                                <div className="card-row" style={{justifyContent: 'space-between', fontSize: '12px'}}>
                                    <div>Alarm: 10:39:52</div>
                                    <div>S3: --:--</div>
                                    <div>S4: --:--</div>
                                    <div>Pat-an: --:--</div>
                                    <div>Abfahrt: --:--</div>
                                    <div style={{color: 'var(--nida-accent-green)'}}>Übergabe: --:--</div>
                                </div>
                            </section>

                            {/* Vitalwerte Demo */}
                            <section className="nida-card">
                                <div className="card-header">Vitalwerte</div>
                                <div className="vital-grid">
                                    <div className="vital-tile">
                                        <div className="info-label">HF</div>
                                        <div className="vital-val">82</div>
                                    </div>
                                    <div className="vital-tile">
                                        <div className="info-label">SpO2</div>
                                        <div className="vital-val">98</div>
                                    </div>
                                    <div className="vital-tile">
                                        <div className="info-label">RR</div>
                                        <div className="vital-val">130/80</div>
                                    </div>
                                </div>
                            </section>

                            {/* Transportziel */}
                            <section className="nida-card">
                                <div className="card-header">Transportziel</div>
                                <input className="nida-input" placeholder="Zieleinrichtung suchen..." />
                                <div className="info-group" style={{marginTop: '10px'}}>
                                    <span className="info-label">Ziel-Adresse</span>
                                    <span className="info-value">Klinikum Musterstadt</span>
                                </div>
                            </section>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
